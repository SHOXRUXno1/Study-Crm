# Static SPA + reverse proxy to backend service `backend:8000`
# (resolved by docker compose internal DNS).
server {
    listen 80;
    server_name _;

    # Reasonable upload size for receipts (matches backend RECEIPT_MAX_SIZE_MB).
    client_max_body_size 25m;

    # Gzip text assets for cheaper transfers.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml font/ttf font/otf application/wasm;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets are content-addressed → cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → FastAPI. Same-origin from the browser's POV.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA fallback — all unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
