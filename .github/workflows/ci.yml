name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel previous runs of the same ref so PRs don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------
  # Frontend: lint + tests + build
  # ----------------------------------------------------------
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test --silent

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------
  # Backend: pytest against a real Postgres service.
  # ----------------------------------------------------------
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: study
          POSTGRES_PASSWORD: study_ci
          POSTGRES_DB: study
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U study -d study"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://study:study_ci@localhost:5432/study
      SECRET_KEY: ci-secret-not-for-prod
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: admin123
      CORS_ORIGINS: http://localhost

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Alembic upgrade head
        run: alembic upgrade head

      - name: Pytest
        run: pytest -q
